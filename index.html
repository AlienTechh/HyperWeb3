<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RandomOS 1.0 Beta</title>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; 
            background-color: #0a0a0a;
            display: flex; justify-content: center; align-items: center;
            font-family: -apple-system, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .phone-container {
            width: 320px; height: 650px;
            background: #000;
            border: 12px solid #1a1a1a;
            border-radius: 55px;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }

        .power-btn {
            width: 4px; height: 60px; background: #ff3b30;
            position: absolute; right: -16px; top: 120px;
            border-radius: 0 5px 5px 0; cursor: pointer; z-index: 100;
        }

        .punch-hole {
            width: 12px; height: 12px; background: #1a1a1a;
            border-radius: 50%; position: absolute; top: 15px;
            left: 50%; transform: translateX(-50%); z-index: 50;
        }

        .screen {
            width: 100%; height: 100%;
            background: #000; position: relative;
            border-radius: 43px; overflow: hidden;
        }

        .view {
            display: none; width: 100%; height: 100%;
            position: absolute; flex-direction: column;
            color: white; border-radius: 43px;
        }

        /* Home Screen */
        #homescreen {
            background: linear-gradient(180deg, #121212 0%, #000 100%);
            padding-top: 60px;
            display: none;
        }

        .app-grid {
            display: flex;
            justify-content: flex-start;
            padding: 20px;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .app-icon {
            width: 55px; height: 55px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; background: linear-gradient(#444, #222);
        }

        /* Settings App - FIXES APPLIED HERE */
        #settings-app {
            display: flex; 
            background: #000; 
            z-index: 40;
            overflow: hidden; /* FIX: Prevents the sub-page from peeking out */
            transition: transform 0.7s cubic-bezier(0.2, 0.8, 0.2, 1), 
                        opacity 0.4s ease;
            transform: scale(0); 
            opacity: 0; 
            pointer-events: none;
            transform-origin: 40px 100px; 
        }

        #settings-app.open {
            transform: scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        .settings-content-wrapper {
            display: flex; 
            width: 200%; 
            height: 100%;
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .settings-page { width: 50%; height: 100%; display: flex; flex-direction: column; }

        .settings-header {
            padding: 50px 20px 20px; font-size: 24px; font-weight: bold;
            display: flex; align-items: center;
        }

        .back-btn { font-size: 16px; color: #007aff; cursor: pointer; margin-right: 10px; }

        .settings-list { padding: 10px 20px; }
        .settings-item { 
            padding: 18px 0; border-bottom: 1px solid #1c1c1e; color: #eee; 
            display: flex; justify-content: space-between; cursor: pointer;
        }

        .about-title {
            font-size: 28px; font-weight: 800; text-align: center;
            margin: 40px 0 20px;
        }

        .info-row {
            display: flex; justify-content: space-between;
            padding: 15px 20px; border-bottom: 1px solid #1c1c1e; font-size: 14px;
        }

        .label { color: #888; }

        #home-bar {
            width: 110px; height: 4px; background: rgba(255, 255, 255, 0.4);
            border-radius: 10px; position: absolute; bottom: 8px;
            left: 50%; transform: translateX(-50%); z-index: 60;
            cursor: pointer; display: none;
        }

        #lockscreen { padding-top: 80px; align-items: center; }
        #time { font-size: 3.5rem; font-weight: 200; margin: 0; }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="power-btn" onclick="togglePower()"></div>
        <div class="punch-hole"></div>
        <div id="home-bar" onclick="handleHomeBar()"></div>

        <div class="screen" id="main-screen">
            <div id="lockscreen" class="view">
                <p id="time">00:00</p>
            </div>

            <div id="homescreen" class="view">
                <div class="app-grid">
                    <div class="app-container" onclick="openSettings()">
                        <div class="app-icon">⚙️</div>
                        <p style="font-size: 10px; margin-top: 5px; color: white;">Settings</p>
                    </div>
                </div>
            </div>

            <div id="settings-app" class="view">
                <div class="settings-content-wrapper" id="settings-nav">
                    <div class="settings-page">
                        <div class="settings-header">Settings</div>
                        <div class="settings-list">
                            <div class="settings-item" onclick="goToAbout()">About Phone <span>></span></div>
                        </div>
                    </div>
                    <div class="settings-page">
                        <div class="settings-header">
                            <span class="back-btn" onclick="goBackToSettings()">❮ Back</span>
                        </div>
                        <div class="about-title">RandomOS 1.0</div>
                        <div class="info-row"><span class="label">Phone Name</span><span>rPhone 1 Pro</span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isPowerOn = false;
        let isUnlocked = false;

        function togglePower() {
            isPowerOn = !isPowerOn;
            const settings = document.getElementById('settings-app');
            const homeBar = document.getElementById('home-bar');
            const lock = document.getElementById('lockscreen');
            const home = document.getElementById('homescreen');

            if (!isPowerOn) {
                settings.classList.remove('open');
                lock.style.display = 'none';
                home.style.display = 'none';
                homeBar.style.display = 'none';
                isUnlocked = false;
                setTimeout(goBackToSettings, 700);
            } else {
                lock.style.display = 'flex';
                homeBar.style.display = 'block';
                updateClock();
            }
        }

        function handleHomeBar() {
            const settings = document.getElementById('settings-app');
            if (settings.classList.contains('open')) {
                settings.classList.remove('open');
                setTimeout(goBackToSettings, 700); 
            } else if (isPowerOn && !isUnlocked) {
                isUnlocked = true;
                document.getElementById('lockscreen').style.display = 'none';
                document.getElementById('homescreen').style.display = 'flex';
            }
        }

        function openSettings() {
            document.getElementById('settings-app').classList.add('open');
        }

        function goToAbout() {
            document.getElementById('settings-nav').style.transform = "translateX(-50%)";
        }

        function goBackToSettings() {
            document.getElementById('settings-nav').style.transform = "translateX(0%)";
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('time').textContent = 
                `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        }
        setInterval(updateClock, 1000);
    </script>
</body>
</html>

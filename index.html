<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RandomOS 1.0 Beta</title>
    <style>
        /* 1. NATIVE FEEL OVERRIDES */
        * {
            -webkit-tap-highlight-color: transparent; /* Removes blue highlight on tap */
            user-select: none; /* Prevents text selection */
            outline: none;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0b0b;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Removes browser scroll */
            font-family: -apple-system, system-ui, sans-serif;
            color: white;
        }

        /* 2. PHONE FRAME */
        .phone {
            width: 320px;
            height: 650px;
            background: #000;
            border-radius: 45px;
            border: 10px solid #222;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* 3. LOCKSCREEN */
        #lockscreen {
            position: absolute;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=2070') center/cover;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 60px 20px;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #lockscreen.unlocked {
            transform: translateY(-100%);
        }

        .lock-time { font-size: 50px; font-weight: 200; }
        .lock-date { font-size: 18px; margin-top: -10px; opacity: 0.8; }
        .swipe-hint { font-size: 12px; opacity: 0.6; animation: bounce 2s infinite; }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* 4. HOME SCREEN */
        .screen {
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1964') center/cover;
            padding: 40px 15px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 15px;
        }

        .status-bar {
            position: absolute;
            top: 10px;
            width: 100%;
            padding: 0 25px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            z-index: 50;
        }

        /* 5. APP STYLING */
        .app {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            gap: 5px;
        }

        .icon {
            width: 55px;
            height: 55px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }

        .icon:active { transform: scale(0.9); }

        /* 6. APP WINDOWS (No "Back" Button - use Home Bar) */
        .app-window {
            position: absolute;
            inset: 0;
            background: #fff;
            color: #000;
            z-index: 80;
            transform: scale(0.8);
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 35px;
            padding: 50px 20px;
        }

        .app-window.open {
            transform: scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        /* 7. GESTURE HOME BAR */
        .home-bar {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 5px;
            background: rgba(255,255,255,0.5);
            border-radius: 10px;
            z-index: 200;
            cursor: pointer;
        }

        .home-bar:hover { background: rgba(255,255,255,0.8); }

        .os-label { margin-top: 20px; color: #555; font-size: 14px; }
    </style>
</head>
<body>

    <div class="phone">
        <div class="status-bar">
            <span id="clock">05:14</span>
            <span>5G 🔋</span>
        </div>

        <div id="lockscreen" onclick="unlock()">
            <div style="text-align: center;">
                <div class="lock-time">05:14</div>
                <div class="lock-date">Thursday, Apr 16</div>
            </div>
            <div class="swipe-hint">Tap to Unlock</div>
        </div>

        <div class="screen">
            <div class="app" onclick="openApp('settings')">
                <div class="icon" style="background: linear-gradient(#eee, #999);">⚙️</div>
                <span>Settings</span>
            </div>
            <div class="app">
                <div class="icon" style="background: linear-gradient(#58eb44, #209d10);">📞</div>
                <span>Dialer</span>
            </div>
            <div class="app">
                <div class="icon" style="background: linear-gradient(#ff5e62, #ff9966);">📷</div>
                <span>Gallery</span>
            </div>
        </div>

        <div id="settings" class="app-window">
            <h1>Settings</h1>
            <p style="opacity: 0.6;">System Management</p>
            <hr>
            <div style="padding: 10px 0;">
                <p><strong>Device:</strong> RandomOS Emulator</p>
                <p><strong>Version:</strong> 1.0 Beta</p>
                <p><strong>Developer:</strong> User</p>
            </div>
        </div>

        <div class="home-bar" onclick="goHome()"></div>
    </div>

    <div class="os-label">RandomOS 1.0 Beta</div>

    <script>
        // Clock Functionality
        function updateClock() {
            const now = new Date();
            const time = now.getHours().toString().padStart(2, '0') + ":" + 
                         now.getMinutes().toString().padStart(2, '0');
            document.querySelectorAll('#clock, .lock-time').forEach(el => el.innerText = time);
        }
        setInterval(updateClock, 1000);
        updateClock();

        // OS Logic
        function unlock() {
            document.getElementById('lockscreen').classList.add('unlocked');
        }

        function openApp(id) {
            document.getElementById(id).classList.add('open');
        }

        function goHome() {
            // Close all windows
            document.querySelectorAll('.app-window').forEach(win => win.classList.remove('open'));
            // If locked, just unlock (optional)
            unlock();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyperWebOS</title>
    <style>
        :root {
            /* Smaller Phone Dimensions */
            --phone-width: 300px;
            --phone-height: 620px;
            --app-radius: 40px;
            --icon-radius: 14px;
        }

        body {
            background: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        /* Power Button */
        .power-btn {
            position: absolute;
            right: -15px;
            top: 120px;
            width: 5px;
            height: 50px;
            background: #333;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            z-index: 200;
            transition: background 0.2s;
        }
        .power-btn:active { background: #555; }

        /* Phone Frame */
        #phone-container {
            width: var(--phone-width);
            height: var(--phone-height);
            background: #000;
            border: 10px solid #282828;
            border-radius: 50px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s;
        }

        .screen-off {
            opacity: 0;
            transform: scale(0.98);
            pointer-events: none;
        }

        /* Punch Hole */
        .punch-hole {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 12px;
            background: #000;
            border: 2px solid #1a1a1a;
            border-radius: 50%;
            z-index: 100;
        }

        /* Layers */
        .layer {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.3s;
        }

        #lockscreen {
            background-image: url('https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?q=80&w=1000&auto=format&fit=crop');
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 70px;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        #homescreen {
            background-image: url('https://images.unsplash.com/photo-1618005198919-d3d4b5a92ead?q=80&w=1000&auto=format&fit=crop');
            z-index: 40;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 15px;
            padding: 50px 20px;
            box-sizing: border-box;
        }

        .app-icon {
            width: 52px;
            height: 52px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            border-radius: var(--icon-radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        /* App Window & Animation */
        #app-window {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f0f0f0;
            z-index: 60;
            transform: scale(0);
            opacity: 0;
            border-radius: var(--app-radius);
            transition: 
                transform 0.5s cubic-bezier(0.32, 0.72, 0, 1), 
                opacity 0.2s, 
                border-radius 0.5s cubic-bezier(0.32, 0.72, 0, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #app-window.open {
            transform: scale(1);
            opacity: 1;
            border-radius: 0px; /* Smooth transition from round icon to square screen */
        }

        /* Swipe Bar */
        .nav-handle-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            z-index: 150;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 8px;
            cursor: grab;
        }

        .nav-bar {
            width: 100px;
            height: 4px;
            background: rgba(255,255,255,0.6);
            border-radius: 10px;
        }

        .dark-bar { background: rgba(0,0,0,0.3); }

    </style>
</head>
<body>

    <div style="position: relative;">
        <div class="power-btn" onclick="togglePower()"></div>

        <div id="phone-container">
            <div class="punch-hole"></div>
            
            <div id="lockscreen" class="layer">
                <h1 style="font-size: 2.5rem; margin: 0; font-weight: 300;">12:00</h1>
                <p style="opacity: 0.8;">Swipe up to unlock</p>
            </div>

            <div id="homescreen" class="layer">
                <div class="app-icon" onclick="openApp(this, 'Photos', '#fff')">🏙️</div>
                <div class="app-icon" onclick="openApp(this, 'Mail', '#4285f4')">✉️</div>
                <div class="app-icon" onclick="openApp(this, 'Notes', '#ffd54f')">📝</div>
                <div class="app-icon" onclick="openApp(this, 'Music', '#ff4081')">🎵</div>
            </div>

            <div id="app-window">
                <h2 id="app-title">App</h2>
                <p style="color: #666;">HyperOS Smooth Motion</p>
            </div>

            <div class="nav-handle-container" id="nav-trigger">
                <div class="nav-bar" id="visual-bar"></div>
            </div>
        </div>
    </div>

    <script>
        const phone = document.getElementById('phone-container');
        const lockscreen = document.getElementById('lockscreen');
        const appWindow = document.getElementById('app-window');
        const visualBar = document.getElementById('visual-bar');
        const trigger = document.getElementById('nav-trigger');
        
        let isPowerOn = true;
        let startY = 0;
        let isDragging = false;

        // --- Drag/Swipe Logic for PC and Mobile ---
        const startAction = (e) => {
            isDragging = true;
            startY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        };

        const moveAction = (e) => {
            if (!isDragging) return;
            let currentY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            let diff = startY - currentY;
            if (diff > 10) { // Slight visual lift
                visualBar.style.transform = `translateY(-${Math.min(diff/2, 20)}px)`;
            }
        };

        const endAction = (e) => {
            if (!isDragging) return;
            let endY = e.type.includes('touch') ? e.changedTouches[0].clientY : e.clientY;
            
            if (startY - endY > 60) { // Requirement for a "successful" swipe
                handleSwipeUp();
            }
            
            visualBar.style.transform = `translateY(0)`;
            isDragging = false;
        };

        trigger.addEventListener('mousedown', startAction);
        window.addEventListener('mousemove', moveAction);
        window.addEventListener('mouseup', endAction);

        trigger.addEventListener('touchstart', startAction);
        trigger.addEventListener('touchmove', moveAction);
        trigger.addEventListener('touchend', endAction);

        function handleSwipeUp() {
            if (!lockscreen.classList.contains('hidden_ls')) {
                lockscreen.style.transform = 'translateY(-100%)';
                lockscreen.classList.add('hidden_ls');
                visualBar.classList.add('dark-bar');
            } else if (appWindow.classList.contains('open')) {
                appWindow.classList.remove('open');
            }
        }

        // --- App Zoom Logic ---
        function openApp(el, name, color) {
            const rect = el.getBoundingClientRect();
            const phoneRect = phone.getBoundingClientRect();
            
            // Non-centered origin based on icon position
            const x = ((rect.left + rect.width/2) - phoneRect.left) / phoneRect.width * 100;
            const y = ((rect.top + rect.height/2) - phoneRect.top) / phoneRect.height * 100;
            
            appWindow.style.transformOrigin = `${x}% ${y}%`;
            appWindow.style.backgroundColor = color;
            document.getElementById('app-title').innerText = name;
            appWindow.classList.add('open');
        }

        // --- Power Logic ---
        function togglePower() {
            if (isPowerOn) {
                appWindow.classList.remove('open');
                lockscreen.classList.remove('hidden_ls');
                lockscreen.style.transform = 'translateY(0)';
                phone.classList.add('screen-off');
                visualBar.classList.remove('dark-bar');
                isPowerOn = false;
            } else {
                phone.classList.remove('screen-off');
                isPowerOn = true;
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FakeOS 1.1 - Poco X3 NFC</title>
    <style>
        :root { 
            --spd: 0.5s; 
            --ios-spring: cubic-bezier(0.3, 1.2, 0.3, 1); 
            --bright: 1;
            --ios-blue: #007aff;
            --bg-app: #f2f2f7;
            --bg-item: #fff;
            --text-main: #000;
            --border-color: #d1d1d6;
        }

        .dark-mode {
            --bg-app: #1c1c1e;
            --bg-item: #2c2c2e;
            --text-main: #ffffff;
            --border-color: #3a3a3c;
        }
        
        body { 
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; 
            background: radial-gradient(circle at center, #1c1c1e 0%, #000 100%); 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation;
        }
        
        .phone { 
            width: 290px; height: 600px; background: #000; 
            border: 10px solid #2c2c2e; border-radius: 54px; 
            position: relative; overflow: hidden; 
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }

        /* --- Boot Screen --- */
        .boot-screen {
            position: absolute; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; transition: opacity 0.5s ease;
        }
        .boot-logo { font-size: 32px; font-weight: 800; letter-spacing: 1px; }
        .boot-spinner {
            margin-top: 25px; width: 24px; height: 24px;
            border: 3px solid rgba(255,255,255,0.2); border-top-color: #fff;
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- Setup Wizard --- */
        .setup-container {
            position: absolute; inset: 0; background: #fff; z-index: 9998;
            display: none; flex-direction: column; padding: 60px 25px; color: #000;
            transition: transform 0.6s var(--ios-spring);
        }
        .setup-page { display: none; flex-direction: column; height: 100%; }
        .setup-page.active { display: flex; }

        .setup-title { font-size: 38px; font-weight: 300; text-align: center; margin-bottom: 20px; }
        .setup-input {
            width: 100%; padding: 15px; border-radius: 12px; border: 1.5px solid #eee;
            background: #f9f9f9; color: #000; font-size: 16px; margin-top: 20px;
            box-sizing: border-box; outline: none; text-align: center;
        }
        .setup-list { margin-top: 20px; flex-grow: 1; overflow-y: auto; }
        .setup-list-item { 
            padding: 15px; border-bottom: 1px solid #eee; display: flex; 
            justify-content: space-between; align-items: center; cursor: pointer;
            transition: background 0.2s;
        }
        .setup-list-item:active { background: #f0f0f0; }
        .radio-dot { width: 18px; height: 18px; border: 2px solid #ccc; border-radius: 50%; }
        .setup-list-item.selected .radio-dot { background: var(--ios-blue); border-color: var(--ios-blue); }

        .setup-next-btn {
            width: 60px; height: 60px; background: var(--ios-blue); color: white;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 24px; cursor: pointer; margin: 40px auto 0;
        }

        /* --- UI Layers --- */
        .aod-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 4500; display: none;
            flex-direction: column; justify-content: center; align-items: center;
            color: rgba(255, 255, 255, 0.2); pointer-events: none;
        }
        .aod-time { font-size: 40px; font-weight: 200; }
        .aod-date { font-size: 12px; margin-top: 5px; text-transform: uppercase; }

        .brightness-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; pointer-events: none; z-index: 3800; opacity: calc(1 - var(--bright)); }
        .punch-hole { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 80px; height: 22px; background: #000; border-radius: 20px; z-index: 3900; border: 1px solid #1a1a1a; }
        
        .status-bar { position: absolute; top: 0; width: 100%; height: 40px; display: flex; justify-content: space-between; align-items: center; padding: 0 25px; box-sizing: border-box; color: white; font-size: 12px; font-weight: 600; z-index: 3500; }

        .control-center { position: absolute; top: 0; right: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); z-index: 2500; transform: translateY(-100%); transition: transform 0.5s var(--ios-spring); display: flex; flex-direction: column; align-items: center; padding-top: 100px; gap: 15px; }
        .cc-open { transform: translateY(0); }
        .cc-slider-box { width: 220px; background: rgba(255,255,255,0.15); padding: 20px; border-radius: 28px; color: white; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .cc-btn { width: 220px; padding: 15px; background: rgba(255,255,255,0.15); border-radius: 20px; color: white; font-weight: 600; text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }

        .screen-off { position: absolute; width: 100%; height: 100%; background: #000; z-index: 4000; transition: opacity 0.4s; cursor: pointer; opacity: 0; pointer-events: none; }
        .screen-is-off { opacity: 1; pointer-events: auto; }

        .wallpaper { position: absolute; width: 100%; height: 100%; background: #1a3a5a url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') center/cover; transition: transform 0.8s var(--ios-spring), filter 0.5s; z-index: 1; transform: scale(1.1); }
        .cc-active .wallpaper { filter: blur(25px) brightness(0.6); transform: scale(1.15); }

        .lockscreen { position: absolute; width: 100%; height: 100%; z-index: 3000; display: flex; flex-direction: column; align-items: center; padding-top: 80px; color: white; transition: transform 0.7s var(--ios-spring), opacity 0.4s; }
        .lock-time { font-size: 64px; font-weight: 200; }

        .pin-pad { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(20px); z-index: 3100; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .pin-dots { display: flex; gap: 15px; margin-bottom: 40px; }
        .dot { width: 12px; height: 12px; border: 1.5px solid #fff; border-radius: 50%; }
        .dot.active { background: #fff; transform: scale(1.2); }
        .num-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .num-btn { width: 65px; height: 65px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; justify-content: center; align-items: center; font-size: 28px; cursor: pointer; }

        .fingerprint-scanner { margin-top: auto; margin-bottom: 100px; width: 70px; height: 70px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 50%; display: none; justify-content: center; align-items: center; font-size: 32px; animation: pulse 2s infinite; pointer-events: auto; cursor: pointer; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.3); } 70% { box-shadow: 0 0 0 20px rgba(255, 255, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); } }

        .drag-btn { position: absolute; width: 56px; height: 56px; border-radius: 14px; display: flex; justify-content: center; align-items: center; font-size: 28px; cursor: grab; z-index: 5; opacity: 0; transform: scale(0.5); transition: opacity 0.5s, transform 0.6s var(--ios-spring); }
        .icon-normal-settings { background: linear-gradient(180deg, #5e5e62 0%, #2c2c2e 100%); color: #fff; }
        .icon-normal-cc { background: linear-gradient(180deg, #007aff 0%, #004080 100%); color: #fff; }

        #settingsBtn { top: 110px; left: 30px; }
        #ccIconBtn { top: 110px; left: 110px; }

        .app { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-app); z-index: 100; transform: scale(0); opacity: 0; pointer-events: none; transition: transform var(--spd) var(--ios-spring), opacity 0.3s; display: flex; flex-direction: column; border-radius: 44px; overflow: hidden; }
        .header { padding: 50px 20px 15px; font-weight: 700; font-size: 32px; color: var(--text-main); background: var(--bg-app); }
        .item { padding: 14px 20px; font-size: 17px; border-bottom: 0.5px solid var(--border-color); color: var(--text-main); display: flex; justify-content: space-between; background: var(--bg-item); align-items: center; }
        
        .home-bar { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 120px; height: 5px; background: rgba(255,255,255,0.8); border-radius: 10px; z-index: 3500; cursor: pointer; }

        .is-unlocked .drag-btn { opacity: 1; transform: scale(1); }
        .is-unlocked .lockscreen { transform: translateY(-100%); opacity: 0; pointer-events: none; }
        
        .open .app { transform: scale(1) !important; opacity: 1 !important; pointer-events: auto !important; z-index: 1000; left: 0 !important; top: 0 !important; }
    </style>
</head>
<body id="mainBody">

    <div class="phone" id="phone" ondblclick="handleDoubleTap(event)">

        <div class="boot-screen" id="bootScreen">
            <div class="boot-logo">FakeOS</div>
            <div class="boot-spinner"></div>
        </div>

        <div class="setup-container" id="setupWizard">
            <div class="setup-page active" id="setup-1">
                <div class="setup-title" style="margin-top: 100px;" id="setup-hello">Hello</div>
                <div class="setup-next-btn" onclick="nextSetup(2)">➔</div>
            </div>

            <div class="setup-page" id="setup-2">
                <div class="setup-title" style="font-size: 24px;" id="setup-lang-title">Select language</div>
                <div class="setup-list">
                    <div class="setup-list-item selected" onclick="selectLang(this, 'en')">English <div class="radio-dot"></div></div>
                    <div class="setup-list-item" onclick="selectLang(this, 'ka')">ქართული <div class="radio-dot"></div></div>
                    <div class="setup-list-item" onclick="selectLang(this, 'de')">Deutsch <div class="radio-dot"></div></div>
                    <div class="setup-list-item" onclick="selectLang(this, 'es')">Español <div class="radio-dot"></div></div>
                </div>
                <div class="setup-next-btn" onclick="nextSetup(3)">➔</div>
            </div>

            <div class="setup-page" id="setup-3">
                <div class="setup-title" style="font-size: 24px;" id="setup-name-title">Set Device Name</div>
                <input type="text" id="customDeviceInput" class="setup-input" placeholder="..." value="Poco X3 NFC">
                <div class="setup-next-btn" onclick="finishSetup()">➔</div>
            </div>
        </div>

        <div class="aod-layer" id="aod">
            <div class="aod-time" id="aodTime">00:00</div>
        </div>

        <div class="status-bar">
            <span id="st-time">12:00</span>
            <div class="battery-section">
                <span id="battery-level">85%</span>
            </div>
        </div>

        <div class="control-center" id="ccPanel">
            <div class="cc-slider-box">
                <div id="cc-brightness-label">Brightness</div>
                <input type="range" min="0.1" max="1" step="0.1" value="1" oninput="changeBrightness(this.value)" style="width:100%;">
            </div>
            <div class="cc-btn" onclick="toggleDarkMode()"> <span id="cc-mode-label">Appearance</span>: <span id="mode-text">Light</span></div>
            <div class="cc-btn" onclick="toggleCC(false)" id="cc-done">Done</div>
        </div>

        <div class="screen-off" id="blackOverlay"></div>
        <div class="wallpaper" id="mainWallpaper"></div>
        
        <div class="lockscreen" id="lockView">
            <div class="lock-time" id="clock">12:00</div>
            <div style="margin-top: 5px; opacity: 0.7; font-size: 12px;" id="lock-hint">Hold Home Bar to Unlock</div>
        </div>

        <div class="drag-btn icon-normal-settings" id="settingsBtn" onmousedown="setupDrag(event, this, 'settings')" ontouchstart="setupDrag(event, this, 'settings')">⚙️</div>
        <div class="drag-btn icon-normal-cc" id="ccIconBtn" onclick="toggleCC(true)">📱</div>

        <div class="app" id="settingsApp">
            <div class="header" id="app-settings-title">Settings</div>
            <div id="p1" class="page">
                <div class="item" onclick="showPage(4)"><span id="set-about">About Phone</span> <span>›</span></div>
                <div class="item" onclick="showPage(2)"><span id="set-anim">Animation Speed</span> <span>›</span></div>
                <div class="item" onclick="showPage(1)" style="margin-top:20px; color:var(--ios-blue); font-weight:600;" id="set-back-main">Back</div>
            </div>
            <div id="p4" class="page" style="display:none; padding:20px; text-align:center;">
                <h2 id="about-os">FakeOS 1.1</h2>
                <p id="aboutDeviceName">Poco X3 NFC</p>
                <div class="item" onclick="showPage(1)" style="color:var(--ios-blue);" id="set-back-about">Back</div>
            </div>
        </div>

        <div class="home-bar" id="bottomBar" onmousedown="handleHomeBar()" ontouchstart="handleHomeBar()"></div>
    </div>

    <script>
        // Language Dictionary
        const langData = {
            en: { hello: "Hello", langTitle: "Select language", nameTitle: "Set Device Name", lockHint: "Hold Home Bar to Unlock", settings: "Settings", about: "About Phone", anim: "Animation Speed", back: "Back", brightness: "Brightness", appearance: "Appearance", done: "Done" },
            ka: { hello: "გამარჯობა", langTitle: "აირჩიეთ ენა", nameTitle: "მოწყობილობის სახელი", lockHint: "გახსნისთვის დააჭირეთ 'Home' ზოლს", settings: "პარამეტრები", about: "ტელეფონის შესახებ", anim: "ანიმაციის სიჩქარე", back: "უკან", brightness: "სიკაშკაშე", appearance: "გარეგნობა", done: "მზადაა" },
            de: { hello: "Hallo", langTitle: "Sprache wählen", nameTitle: "Gerätename festlegen", lockHint: "Home-Leiste zum Entsperren halten", settings: "Einstellungen", about: "Über das Telefon", anim: "Animationsgeschwindigkeit", back: "Zurück", brightness: "Helligkeit", appearance: "Aussehen", done: "Fertig" },
            es: { hello: "Hola", langTitle: "Seleccionar idioma", nameTitle: "Nombre del dispositivo", lockHint: "Mantén la barra para desbloquear", settings: "Ajustes", about: "Sobre el teléfono", anim: "Velocidad de animación", back: "Atrás", brightness: "Brillo", appearance: "Apariencia", done: "Hecho" }
        };

        let currentLang = 'en';

        function selectLang(el, code) {
            document.querySelectorAll('.setup-list-item').forEach(item => item.classList.remove('selected'));
            el.classList.add('selected');
            currentLang = code;
            applyLanguage();
        }

        function applyLanguage() {
            const d = langData[currentLang];
            document.getElementById('setup-hello').innerText = d.hello;
            document.getElementById('setup-lang-title').innerText = d.langTitle;
            document.getElementById('setup-name-title').innerText = d.nameTitle;
            document.getElementById('lock-hint').innerText = d.lockHint;
            document.getElementById('app-settings-title').innerText = d.settings;
            document.getElementById('set-about').innerText = d.about;
            document.getElementById('set-anim').innerText = d.anim;
            document.getElementById('set-back-main').innerText = d.back;
            document.getElementById('set-back-about').innerText = d.back;
            document.getElementById('cc-brightness-label').innerText = d.brightness;
            document.getElementById('cc-mode-label').innerText = d.appearance;
            document.getElementById('cc-done').innerText = d.done;
        }

        // Logic
        function nextSetup(page) {
            document.querySelectorAll('.setup-page').forEach(p => p.classList.remove('active'));
            document.getElementById('setup-' + page).classList.add('active');
        }

        function finishSetup() {
            document.getElementById('aboutDeviceName').innerText = document.getElementById('customDeviceInput').value;
            document.getElementById('setupWizard').style.transform = "translateY(-100%)";
            setTimeout(() => { document.getElementById('setupWizard').style.display = 'none'; }, 600);
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('bootScreen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('bootScreen').style.display = 'none';
                    document.getElementById('setupWizard').style.display = 'flex';
                }, 500);
            }, 2000);
        });

        const phone = document.getElementById('phone'), blackOverlay = document.getElementById('blackOverlay'), ccPanel = document.getElementById('ccPanel'), settingsApp = document.getElementById('settingsApp');
        let isPowerOn = true;

        function handleHomeBar() { 
            if (ccPanel.classList.contains('cc-open')) toggleCC(false);
            else if (phone.classList.contains('open')) phone.classList.remove('open');
            else phone.classList.add('is-unlocked');
        }

        function handleDoubleTap() {
            if (!isPowerOn) { blackOverlay.classList.remove('screen-is-off'); isPowerOn = true; }
            else { blackOverlay.classList.add('screen-is-off'); phone.classList.remove('is-unlocked'); isPowerOn = false; }
        }

        function toggleCC(o) { ccPanel.classList.toggle('cc-open', o); }
        function showPage(n) { 
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none'); 
            document.getElementById('p' + n).style.display = 'block'; 
        }

        function setupDrag(e, el, type) {
            if (!phone.classList.contains('is-unlocked') || phone.classList.contains('open')) return;
            phone.classList.add('open');
            showPage(1);
        }

        function changeBrightness(v) { document.documentElement.style.setProperty('--bright', v); }
        function toggleDarkMode() {
            document.getElementById('mainBody').classList.toggle('dark-mode');
            document.getElementById('mode-text').innerText = document.getElementById('mainBody').classList.contains('dark-mode') ? "Dark" : "Light";
        }

        function updateTime() { 
            const now = new Date(); 
            const t = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0'); 
            document.getElementById('clock').innerText = t; 
            document.getElementById('st-time').innerText = t; 
        }
        setInterval(updateTime, 1000); updateTime();
    </script>
</body>
</html>

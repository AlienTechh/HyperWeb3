<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RandomOS 1.0 Beta</title>
    <style>
        body {
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* The Phone Frame */
        .phone-container {
            width: 320px;
            height: 650px;
            background: #000000;
            border: 12px solid #1a1a1a;
            border-radius: 55px;
            position: relative;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.03);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* The Punch Hole Camera */
        .punch-hole {
            width: 12px;
            height: 12px;
            background: #1a1a1a;
            border-radius: 50%;
            position: absolute;
            top: 15px; /* Positioned slightly down from the top */
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            box-shadow: inset 0 0 2px #000; /* Subtle depth for the lens */
        }

        /* The Pure Black Screen */
        .screen {
            flex-grow: 1;
            background: #000000;
            position: relative;
        }

        /* The Home Indicator Bar */
        .home-bar {
            width: 110px;
            height: 4px;
            background: #333;
            border-radius: 10px;
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="punch-hole"></div>
        <div class="home-bar"></div>

        <div class="screen"></div>
    </div>

</body>
</html>

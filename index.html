<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FakeOS 1.1 - Poco X3 NFC</title>
    <style>
        :root { 
            --spd: 0.5s; 
            --ios-spring: cubic-bezier(0.3, 1.2, 0.3, 1); 
            --bright: 1;
            --ios-blue: #007aff;
            --bg-app: #f2f2f7;
            --bg-item: #fff;
            --text-main: #000;
            --border-color: #d1d1d6;
            --poco-yellow: #FFCE00;
        }

        .dark-mode {
            --bg-app: #121212;
            --bg-item: #1e1e1e;
            --text-main: #ffffff;
            --border-color: #333;
        }
        
        body { 
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; 
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent; 
        }
        
        /* REAL SURYA BEZEL & RADIUS */
        .phone { 
            width: 310px; height: 650px; background: #000; 
            /* X3 NFC has a 20:9 ratio and curved corners */
            border-top: 10px solid #1a1a1a;
            border-left: 10px solid #1a1a1a;
            border-right: 10px solid #1a1a1a;
            border-bottom: 18px solid #1a1a1a; /* Thicker "Chin" like real Surya */
            border-radius: 42px; /* Authentic Surya corner radius */
            position: relative; overflow: hidden; 
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
        }

        /* REAL SURYA CIRCULAR PUNCH-HOLE */
        .punch-hole { 
            position: absolute; top: 12px; left: 50%; transform: translateX(-50%); 
            width: 14px; height: 14px; background: #000; border-radius: 50%; 
            z-index: 3900; border: 1px solid #222; 
        }

        .brightness-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; pointer-events: none; z-index: 3800; opacity: calc(1 - var(--bright)); }
        .status-bar { position: absolute; top: 0; width: 100%; height: 40px; display: flex; justify-content: space-between; align-items: center; padding: 0 25px; box-sizing: border-box; color: white; font-size: 12px; font-weight: 600; z-index: 3500; }

        .control-center { position: absolute; top: 0; right: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); z-index: 2500; transform: translateY(-100%); transition: transform 0.5s var(--ios-spring); display: flex; flex-direction: column; align-items: center; padding-top: 100px; gap: 15px; }
        .cc-open { transform: translateY(0); }
        .cc-slider-box { width: 220px; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 28px; color: white; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .cc-btn { width: 220px; padding: 15px; background: rgba(255,255,255,0.1); border-radius: 20px; color: white; font-weight: 600; text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }

        .screen-off { position: absolute; width: 100%; height: 100%; background: #000; z-index: 4000; transition: opacity 0.4s; cursor: pointer; opacity: 0; pointer-events: none; }
        .screen-is-off { opacity: 1; pointer-events: auto; }

        .wallpaper { position: absolute; width: 100%; height: 100%; background: #1a3a5a url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') center/cover; transition: transform 0.8s var(--ios-spring), filter 0.5s; z-index: 1; transform: scale(1.1); }
        
        .lockscreen { position: absolute; width: 100%; height: 100%; z-index: 3000; display: flex; flex-direction: column; align-items: center; padding-top: 80px; color: white; transition: transform 0.7s var(--ios-spring), opacity 0.4s; }
        .lock-time { font-size: 68px; font-weight: 300; }

        .pin-pad { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(25px); z-index: 3100; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .pin-dots { display: flex; gap: 15px; margin-bottom: 40px; }
        .dot { width: 12px; height: 12px; border: 1.5px solid #fff; border-radius: 50%; }
        .dot.active { background: #fff; transform: scale(1.2); }
        .num-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .num-btn { width: 65px; height: 65px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; justify-content: center; align-items: center; font-size: 28px; cursor: pointer; }

        .drag-btn { position: absolute; width: 60px; height: 60px; border-radius: 16px; display: flex; justify-content: center; align-items: center; font-size: 32px; cursor: grab; z-index: 5; opacity: 0; transform: scale(0.5); transition: opacity 0.5s, transform 0.6s var(--ios-spring); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .icon-normal-settings { background: linear-gradient(180deg, #5e5e62 0%, #2c2c2e 100%); color: #fff; }
        .icon-normal-settings::before { content: "⚙️"; }
        .icon-normal-cc { background: linear-gradient(180deg, #007aff 0%, #004080 100%); color: #fff; }
        .icon-normal-cc::before { content: "📊"; }
        
        .icon-glassy { background: rgba(255, 255, 255, 0.2) !important; backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.3); color: #fff; }

        #settingsBtn { top: 110px; left: 30px; }
        #ccIconBtn { top: 110px; left: 115px; }

        .app { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-app); z-index: 100; transform: scale(0); opacity: 0; pointer-events: none; transition: transform var(--spd) var(--ios-spring), opacity 0.3s; display: flex; flex-direction: column; border-radius: 32px; overflow: hidden; }
        .header { padding: 60px 24px 20px; font-weight: 800; font-size: 34px; color: var(--text-main); }
        .item { padding: 16px 24px; font-size: 17px; border-bottom: 0.5px solid var(--border-color); color: var(--text-main); display: flex; justify-content: space-between; background: var(--bg-item); align-items: center; }

        .home-bar { position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); width: 130px; height: 5px; background: rgba(255,255,255,0.8); border-radius: 10px; z-index: 3500; cursor: pointer; }

        .is-unlocked .wallpaper { transform: scale(1); }
        .is-unlocked .drag-btn { opacity: 1; transform: scale(1); }
        .is-unlocked .lockscreen { transform: translateY(-100%); opacity: 0; pointer-events: none; }
        .open .app { transform: scale(1) !important; opacity: 1 !important; pointer-events: auto !important; z-index: 1000; }
        .open .wallpaper { filter: blur(40px); transform: scale(1.2) !important; }
    </style>
</head>
<body id="mainBody">

    <div class="phone" id="phone" ondblclick="handleDoubleTap(event)">
        <audio id="sound-unlock" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>
        <audio id="sound-lock" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

        <div class="brightness-overlay"></div>
        <div class="punch-hole"></div>

        <div class="status-bar">
            <span id="st-time">12:00</span>
            <div class="battery-section" onclick="toggleCC(true)" style="cursor: pointer;">
                <span id="battery-level">--%</span>
            </div>
        </div>

        <div class="control-center" id="ccPanel">
            <div class="cc-slider-box">
                <div style="font-size:14px; font-weight:600; margin-bottom:12px;">Brightness</div>
                <input type="range" min="0.1" max="1" step="0.1" value="1" oninput="changeBrightness(this.value)" style="width:100%; accent-color: var(--poco-yellow);">
            </div>
            <div class="cc-btn" onclick="toggleDarkMode()"> Dark Mode: <span id="mode-text">Off</span></div>
            <div class="cc-btn" style="margin-top:10px; color: var(--poco-yellow);" onclick="toggleCC(false)">Close</div>
        </div>

        <div class="screen-off" id="blackOverlay"></div>
        <div class="wallpaper" id="mainWallpaper"></div>
        
        <div class="lockscreen" id="lockView">
            <div class="lock-time" id="clock">12:00</div>
            <div style="margin-top: 5px; opacity: 0.8;">Double tap to lock</div>
        </div>

        <div class="pin-pad" id="pinPad">
            <div id="pinStatus" style="margin-bottom: 25px;">Enter PIN</div>
            <div class="pin-dots" id="pinDots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <div class="num-grid">
                <div class="num-btn" onclick="inputPin(1)">1</div><div class="num-btn" onclick="inputPin(2)">2</div><div class="num-btn" onclick="inputPin(3)">3</div>
                <div class="num-btn" onclick="inputPin(4)">4</div><div class="num-btn" onclick="inputPin(5)">5</div><div class="num-btn" onclick="inputPin(6)">6</div>
                <div class="num-btn" onclick="inputPin(7)">7</div><div class="num-btn" onclick="inputPin(8)">8</div><div class="num-btn" onclick="inputPin(9)">9</div>
                <div></div><div class="num-btn" onclick="inputPin(0)">0</div>
            </div>
            <div style="margin-top: 40px; cursor: pointer;" onclick="closePinPad()">Cancel</div>
        </div>

        <div class="drag-btn icon-normal-settings" id="settingsBtn" onmousedown="setupDrag(event, this, 'settings')" ontouchstart="setupDrag(event, this, 'settings')"></div>
        <div class="drag-btn icon-normal-cc" id="ccIconBtn" onmousedown="setupDrag(event, this, 'cc')" ontouchstart="setupDrag(event, this, 'cc')"></div>

        <div class="app" id="settingsApp">
            <div class="header">Settings</div>
            <div class="item">Device: <span style="font-weight: bold; color: var(--poco-yellow);">Poco X3 NFC (Surya)</span></div>
            <div class="item" onclick="showPage(5)">Icons Style <span>›</span></div>
            <div class="item" style="color:var(--ios-blue); font-weight:600;" onclick="showPage(1); document.getElementById('phone').classList.remove('open')">Back to Home</div>
        </div>

        <div class="home-bar" id="bottomBar" onclick="handleHomeBar()"></div>
    </div>

    <script>
        const phone = document.getElementById('phone'), blackOverlay = document.getElementById('blackOverlay'), wallpaper = document.getElementById('mainWallpaper'), ccPanel = document.getElementById('ccPanel');
        const settingsApp = document.getElementById('settingsApp');
        const soundUnlock = document.getElementById('sound-unlock');
        const soundLock = document.getElementById('sound-lock');
        
        let isPowerOn = true, activePin = null, currentPinInput = "";

        function playSfx(s) { s.currentTime = 0; s.play().catch(e => {}); }

        function handleHomeBar() { 
            if (ccPanel.classList.contains('cc-open')) { toggleCC(false); return; }
            if (isPowerOn && !phone.classList.contains('is-unlocked')) {
                phone.classList.add('is-unlocked'); playSfx(soundUnlock);
            } else { phone.classList.remove('open'); } 
        }

        function handleDoubleTap(e) {
            if (e.target.closest('.cc-btn') || ccPanel.classList.contains('cc-open')) return;
            if (isPowerOn) { 
                playSfx(soundLock); blackOverlay.classList.add('screen-is-off'); 
                phone.classList.remove('is-unlocked'); isPowerOn = false; 
            } else { 
                blackOverlay.classList.remove('screen-is-off'); isPowerOn = true; 
            }
        }

        function setupDrag(e, el, type) {
            if (!phone.classList.contains('is-unlocked') || phone.classList.contains('open')) return;
            let moved = false;
            const isTouch = e.type === 'touchstart';
            const startX = isTouch ? e.touches[0].clientX : e.clientX;
            const startY = isTouch ? e.touches[0].clientY : e.clientY;
            const initX = el.offsetLeft; const initY = el.offsetTop;

            const move = (ev) => {
                const curX = isTouch ? ev.touches[0].clientX : ev.clientX;
                const curY = isTouch ? ev.touches[0].clientY : ev.clientY;
                if (Math.abs(curX - startX) > 5) moved = true;
                el.style.left = (initX + (curX - startX)) + 'px';
                el.style.top = (initY + (curY - startY)) + 'px';
            };

            const stop = () => { 
                document.removeEventListener(isTouch ? 'touchmove' : 'mousemove', move); 
                document.removeEventListener(isTouch ? 'touchend' : 'mouseup', stop); 
                if (!moved) { if(type === 'settings') phone.classList.add('open'); else toggleCC(true); } 
            };
            document.addEventListener(isTouch ? 'touchmove' : 'mousemove', move); document.addEventListener(isTouch ? 'touchend' : 'mouseup', stop);
        }

        function changeBrightness(v) { document.documentElement.style.setProperty('--bright', v); }
        function toggleCC(o) { if(isPowerOn && phone.classList.contains('is-unlocked')) ccPanel.classList.toggle('cc-open', o); }
        function toggleDarkMode() { 
            document.getElementById('mainBody').classList.toggle('dark-mode'); 
            document.getElementById('mode-text').innerText = document.getElementById('mainBody').classList.contains('dark-mode') ? "On" : "Off";
        }
        function updateTime() { 
            const now = new Date(); 
            const t = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0'); 
            document.getElementById('clock').innerText = t; document.getElementById('st-time').innerText = t; 
        }
        setInterval(updateTime, 1000); updateTime();
        async function updateBattery() {
            try { const b = await navigator.getBattery(); document.getElementById('battery-level').innerText = Math.floor(b.level * 100) + "%"; } 
            catch (e) { document.getElementById('battery-level').innerText = "100%"; }
        }
        updateBattery();
    </script>
</body>
</html>
